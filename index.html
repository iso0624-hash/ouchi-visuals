<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="フォルダ構造から生成した画像サイト。">
  <title>画像の展示室 | ouchi visuals</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <div class="shell header-inner">
      <a class="brand" href="./index.html">ouchi visuals</a>
      <span class="tagline">画像の展示室</span>
    </div>
  </header>
  <main class="shell">
    <section class="intro">
      <p class="eyebrow">gallery</p>
      <h1>画像の展示室</h1>
      <p>フォルダごとに、素材を眺めるための静かな置き場です。</p>
    </section>
    <section aria-labelledby="categories">
      <div class="section-heading">
        <p class="eyebrow">categories</p>
        <h2 id="categories">カテゴリ</h2>
      </div>
      <div class="category-grid">
        <article class="category-card">
          <a href="./categories/modern-japanese.html">
            <img src="./assets/images/modern-japanese/lecture-1/001.png" alt="現代文の代表画像" loading="lazy">
            <div class="card-copy">
            <h3>現代文</h3>
            <p>2 アルバム / 18 点</p>
            </div>
          </a>
        </article>
        <article class="category-card">
          <a href="./categories/social-science.html">
            <img src="./assets/images/social-science/root/001.png" alt="社会科学の代表画像" loading="lazy">
            <div class="card-copy">
            <h3>社会科学</h3>
            <p>6 アルバム / 40 点</p>
            </div>
          </a>
        </article>
        <article class="category-card">
          <a href="./categories/interview.html">
            <img src="./assets/images/interview/root/001.png" alt="面接関連の代表画像" loading="lazy">
            <div class="card-copy">
            <h3>面接関連</h3>
            <p>4 アルバム / 25 点</p>
            </div>
          </a>
        </article>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="shell">ouchi visuals</div></footer>
</body>
</html>
