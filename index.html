<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="フォルダ構造から生成した画像サイト。">
  <title>画像の展示室 | ouchi visuals</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <div class="shell header-inner">
      <a class="brand" href="./index.html">ouchi visuals</a>
      <span class="tagline">画像の展示室</span>
    </div>
  </header>
  <main class="shell">
    <section class="intro">
      <p class="eyebrow">gallery</p>
      <h1>画像の展示室</h1>
      <p>フォルダごとに、素材を眺めるための静かな置き場です。</p>
    </section>
    <section aria-labelledby="categories">
      <div class="section-heading">
        <p class="eyebrow">categories</p>
        <h2 id="categories">カテゴリ</h2>
      </div>
      <div class="category-grid">
        <article class="category-card">
          <a href="./categories/modern-japanese.html">
            <img src="./assets/images/modern-japanese/lecture-1/001.png" alt="現代文の代表画像" loading="lazy">
            <div class="card-copy">
              <img class="category-icon" src="./assets/icons/subjects-01-japanese-reading-comprehension.png" alt="現代文のカテゴリアイコン" data-icon-id="icon-subjects-japanese-reading" data-keywords="category icon" loading="lazy">
            <h3>現代文の読み方</h3>
            <p class="card-description">設問の目的をつかみ、根拠を拾い、文章を正確に読むための教材画像。</p>
            <p>2 アルバム / 18 点</p>
            </div>
          </a>
        </article>
        <article class="category-card">
          <a href="./categories/social-science.html">
            <img src="./assets/images/social-science/root/001.png" alt="社会科学の代表画像" loading="lazy">
            <div class="card-copy">
              <img class="category-icon" src="./assets/icons/content-04-analysis.png" alt="社会科学のカテゴリアイコン" data-icon-id="icon-content-analysis" data-keywords="category icon" loading="lazy">
            <h3>社会科学の基礎整理</h3>
            <p class="card-description">政治、行政、地域、経済、国際関係を図解で整理する学習素材。</p>
            <p>6 アルバム / 40 点</p>
            </div>
          </a>
        </article>
        <article class="category-card">
          <a href="./categories/interview.html">
            <img src="./assets/images/interview/root/001.png" alt="面接関連の代表画像" loading="lazy">
            <div class="card-copy">
              <img class="category-icon" src="./assets/icons/content-07-question.png" alt="面接関連のカテゴリアイコン" data-icon-id="icon-content-question" data-keywords="category icon" loading="lazy">
            <h3>面接対策・自己PR</h3>
            <p class="card-description">志望動機、自己PR、地域理解、行政理解を面接で伝えるための整理素材。</p>
            <p>4 アルバム / 25 点</p>
            </div>
          </a>
        </article>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="shell">ouchi visuals</div></footer>
</body>
</html>
